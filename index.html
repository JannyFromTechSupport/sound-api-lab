<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Janny's Sound API | Custom Audio Interface using HTML and JavaScript</title>
  <link rel="icon" type="image/png" href="/assets/icons/wave-sound.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="scene">
    <div class="card">
      <h1 class="main-title">🎵 Janny's Sound API 🎵</h1>
      <!-- Vinyl record -->
      <div class="vinyl-wrap">
        <div class="vinyl" id="vinyl">
          <div class="vinyl-label">
            <div class="vinyl-center"></div>
          </div>
          <div class="vinyl-groove g1"></div>
          <div class="vinyl-groove g2"></div>
          <div class="vinyl-groove g3"></div>
          <div class="vinyl-groove g4"></div>
        </div>
      </div>

      <!-- Track info -->
      <div class="track-info">
        <p class="track-title" id="track-title">Faded</p>
        <p class="track-artist" id="track-artist">Alan Walker &nbsp;&middot;&nbsp; NCS Release</p>
      </div>

      <!-- Hidden audio -->
      <audio id="audio" src="/assets/audio/alan-walker-faded.mp3"></audio>

      <!-- Progress bar -->
      <div class="progress-wrap">
        <div class="progress-track" id="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <div class="time-row">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>

      <!-- Main transport -->
      <div class="transport">
        <button class="neu-btn icon-btn" id="btn-skip-back" title="Skip back 10s (←)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10" />
            <path d="M3.51 15a9 9 0 1 0 .49-3.31" />
          </svg>
          <span class="btn-label">−10s</span>
        </button>

        <button class="neu-btn play-btn" id="btn-play" title="Play / Pause (Space)">
          <svg id="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="6 3 20 12 6 21 6 3" />
          </svg>
          <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="4" width="4" height="16" rx="1" />
            <rect x="14" y="4" width="4" height="16" rx="1" />
          </svg>
        </button>

        <button class="neu-btn icon-btn" id="btn-skip-fwd" title="Skip forward 10s (→)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-.49-3.31" />
          </svg>
          <span class="btn-label">+10s</span>
        </button>
      </div>

      <!-- Toggle row -->
      <div class="toggle-row">
        <button class="neu-btn toggle-btn" id="btn-mute" title="Mute (M)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" id="vol-svg">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path id="wave-lg" d="M19.07 4.93a10 10 0 0 1 0 14.14" />
            <path id="wave-sm" d="M15.54 8.46a5 5 0 0 1 0 7.07" />
          </svg>
          Mute
        </button>
        <button class="neu-btn toggle-btn" id="btn-loop" title="Loop (L)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9" />
            <path d="M3 11V9a4 4 0 0 1 4-4h14" />
            <polyline points="7 23 3 19 7 15" />
            <path d="M21 13v2a4 4 0 0 1-4 4H3" />
          </svg>
          Loop
        </button>
      </div>

      <!-- Volume slider -->
      <div class="slider-row">
        <span class="slider-lbl">Vol</span>
        <input type="range" class="neu-slider" id="vol-slider" min="0" max="100" value="80" step="1" />
        <span class="slider-val" id="vol-label">80%</span>
      </div>

      <!-- Speed chips -->
      <div class="speed-section">
        <span class="section-label">Speed</span>
        <div class="speed-chips" id="speed-chips">
          <button class="neu-btn speed-chip" data-speed="0.5">0.5×</button>
          <button class="neu-btn speed-chip" data-speed="0.75">0.75×</button>
          <button class="neu-btn speed-chip active" data-speed="1">1×</button>
          <button class="neu-btn speed-chip" data-speed="1.5">1.5×</button>
          <button class="neu-btn speed-chip" data-speed="2">2×</button>
        </div>
      </div>

      <!-- Keyboard hints -->
      <div class="kbd-row">
        <span class="kbd-item"><kbd>Space</kbd> play</span>
        <span class="kbd-item"><kbd>M</kbd> mute</span>
        <span class="kbd-item"><kbd>L</kbd> loop</span>
        <span class="kbd-item"><kbd>← →</kbd> skip</span>
        <span class="kbd-item"><kbd>↑ ↓</kbd> vol</span>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
